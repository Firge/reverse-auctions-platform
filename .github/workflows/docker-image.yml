name: Build and Push Docker Artifacts

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Prepare image namespace
        id: prep
        run: echo "image_namespace=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push with bake
        uses: docker/bake-action@v5
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_NAMESPACE: ${{ steps.prep.outputs.image_namespace }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          files: |
            docker-compose.build.hcl
          targets: default
          push: true
