name: Build and Push Docker Artifacts

on:
  push:
    branches:
      - main

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push with bake
        uses: docker/bake-action@v5
        with:
          files: |
            docker-compose.build.hcl
          targets: default
          push: true
          set: |
            backend.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest
            frontend.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest
            tools.tags=${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/tools:${{ github.sha }},${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/tools:latest
