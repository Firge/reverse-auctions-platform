services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-catalog}
      POSTGRES_USER: ${POSTGRES_USER:-catalog}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-catalog}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-catalog}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  web:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-owner/reverse-auctions-platform}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    env_file:
      - backend/.env
    environment:
      - DB_NAME=${POSTGRES_DB:-catalog}
      - DB_USER=${POSTGRES_USER:-catalog}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-catalog}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery_worker:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-owner/reverse-auctions-platform}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A bidfall worker --loglevel=info
    env_file:
      - backend/.env
    environment:
      - DB_NAME=${POSTGRES_DB:-catalog}
      - DB_USER=${POSTGRES_USER:-catalog}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-catalog}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  celery_beat:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-owner/reverse-auctions-platform}/backend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    command: celery -A bidfall beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - backend/.env
    environment:
      - DB_NAME=${POSTGRES_DB:-catalog}
      - DB_USER=${POSTGRES_USER:-catalog}
      - DB_PASSWORD=${POSTGRES_PASSWORD:-catalog}
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - CELERY_BROKER_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started

  frontend:
    image: ${IMAGE_REGISTRY:-ghcr.io}/${IMAGE_NAMESPACE:-owner/reverse-auctions-platform}/frontend:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - web

volumes:
  pgdata:
  redis_data:
